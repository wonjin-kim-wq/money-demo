<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$$$ 황금성 $$$ SPORTS & CASINO</title>
    <link rel="stylesheet" href="gambling.css">
    <link rel="stylesheet" href="games.css">
</head>
<body>
    <div id="mobile-container">
        <!-- Status bar -->
        <div class="status-bar">
            <span class="time">12:30</span>
            <div class="status-icons">
                <span class="icon">5G</span>
                <span class="icon">🔋</span>
            </div>
        </div>

        <div class="scrollable-content">
            <!-- Header -->
            <header class="app-header">
                <div class="hamburger">☰</div>
                <div class="logo">
                    <h1>💸 황금성 💸</h1>
                    <span class="subtitle">SPORTS & CASINO</span>
                </div>
                <div class="user-info">
                    <span id="user-balance" class="hidden">0</span>
                    <div class="profile-icon">👤</div>
                </div>
            </header>

            <!-- Login Entry Area -->
            <div class="auth-buttons">
                <button class="btn-login sim-trigger"><span>🔐</span> 로그인</button>
                <button class="btn-signup sim-trigger"><span>🔥</span> 회원가입</button>
                <button class="btn-telegram sim-trigger"><span>✈️</span> 텔레그램 문의</button>
            </div>

            <!-- Main Banner -->
            <div class="promo-banner">
                <div class="banner-content">
                    <h2>신규 가입 즉시 5만 쿠폰 지급!</h2>
                    <p>메이저 안전공원 졸업 없음</p>
                </div>
                <div class="carousel-indicators">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>

            <!-- 3x3 Menu Grid -->
            <div class="menu-grid">
                <button class="menu-item sim-trigger"><span>💰</span>충전</button>
                <button class="menu-item sim-trigger"><span>💸</span>환전</button>
                <button class="menu-item sim-trigger"><span>🎧</span>고객센터</button>
                <button class="menu-item sim-trigger"><span>⚽</span>해외형스포츠</button>
                <button class="menu-item sim-trigger"><span>⚾</span>국내형스포츠</button>
                <button class="menu-item sim-trigger"><span>🔴</span>LIVE스포츠</button>
                <button class="menu-item sim-trigger"><span>🎮</span>E-스포츠</button>
                <button class="menu-item sim-trigger"><span>🕹️</span>가상스포츠</button>
                <button class="menu-item sim-trigger"><span>🎁</span>스페셜</button>
            </div>

            <!-- Casino Game Grid (2 columns) -->
            <div class="casino-grid">
                <div class="casino-card sim-trigger">
                    <div class="live-badge">LIVE</div>
                    <div class="card-bg bg-card1">
                        <span class="card-icon">🃏</span>
                        <span class="card-title">바카라</span>
                    </div>
                    <div class="card-footer">스카이파크 바카라</div>
                </div>
                <div class="casino-card sim-trigger">
                    <div class="live-badge">LIVE</div>
                    <div class="card-bg bg-card2">
                        <span class="card-icon">🎰</span>
                        <span class="card-title">홀짝</span>
                    </div>
                    <div class="card-footer">로투스 홀짝</div>
                </div>
                <div class="casino-card sim-trigger">
                    <div class="live-badge">LIVE</div>
                    <div class="card-bg bg-card3">
                        <span class="card-icon">🎲</span>
                        <span class="card-title">식보</span>
                    </div>
                    <div class="card-footer">MGM 식보</div>
                </div>
                <div class="casino-card sim-trigger">
                    <div class="live-badge">LIVE</div>
                    <div class="card-bg bg-card4">
                        <span class="card-icon">🎯</span>
                        <span class="card-title">블랙잭</span>
                    </div>
                    <div class="card-footer">에볼루션 블랙잭</div>
                </div>
            </div>

            <!-- Sports Betting Odds -->
            <div class="odds-section">
                <div class="odds-header">조합배팅</div>
                <div class="odds-card sim-trigger">
                    <div class="odds-badges">
                        <span class="badge blue">좌</span> <span class="plus">+</span> <span class="badge red">3</span> <span class="plus">+</span> <span class="badge red">짝</span>
                    </div>
                    <div class="odds-rate">1.95</div>
                </div>
                <div class="odds-card sim-trigger">
                    <div class="odds-badges">
                        <span class="badge red">우</span> <span class="plus">+</span> <span class="badge blue">4</span> <span class="plus">+</span> <span class="badge blue">홀</span>
                    </div>
                    <div class="odds-rate">3.60</div>
                </div>
            </div>
            
            <div style="height: 120px;"></div> <!-- 패딩 -->
        </div>

        <!-- Bottom Fixed Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item sim-trigger"><span>🛒</span>배팅카트</button>
            <button class="nav-item sim-trigger"><span>📝</span>배팅내역</button>
            <button class="nav-item play-btn sim-trigger"><span>🎮</span>플레이</button>
            <button class="nav-item sim-trigger"><span>🎧</span>고객센터</button>
            <button class="nav-item sim-trigger"><span>💰</span>충환전</button>
        </nav>

        <!-- Browser Bottom Bar -->
        <div class="browser-bar">
            <span class="icon">◀</span>
            <span class="icon">▶</span>
            <div class="url-bar">🔒 gold-bet.com</div>
            <span class="icon">⟳</span>
            <span class="icon">⋮</span>
        </div>
        
        <!-- Flash Overlay -->
        <div id="flash-overlay"></div>

        <!-- Game/Feature Overlay (Hidden by default) -->
        <div id="game-overlay" class="hidden">
            <div class="overlay-header">
                <button id="close-overlay">◀ 뒤로</button>
                <h3 id="overlay-title">게임 제목</h3>
            </div>
            <div id="overlay-content">
                <!-- 게임 UI가 동적으로 삽입될 영역 -->
            </div>
            
            <!-- 배팅 장바구니 바텀시트 (스포츠용) -->
            <div id="betting-cart-sheet" class="bottom-sheet hidden">
                <div class="sheet-header">
                    <h4>배팅 카트</h4>
                    <span id="close-cart">▼</span>
                </div>
                <div id="cart-items"></div>
                <div class="cart-footer">
                    <div class="cart-summary">
                        <span>총 배당: <b id="total-odds">1.00</b></span>
                        <input type="number" id="bet-amount" placeholder="배팅 금액 입력">
                    </div>
                    <div class="cart-result">예상 적중금: <b id="expected-win">0</b>원</div>
                    <button id="btn-place-bet" class="btn-full-pink">배팅하기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Login/Registration Simulation Modal -->
    <div id="simulation-modal" class="modal">
        <div class="modal-content">
            <div class="modal-logo">💸 황금성 💸</div>
            <h2>로그인 정보를 입력하세요</h2>
            
            <form id="auto-form" class="fake-form">
                <div class="input-group">
                    <input type="text" id="sim-id" placeholder="아이디" readonly>
                </div>
                <div class="input-group">
                    <input type="password" id="sim-pw" placeholder="비밀번호" readonly>
                </div>
                <div class="forgot-pw">비밀번호 찾기</div>
                
                <button type="button" class="btn-full-pink sim-trigger-inner">로그인</button>
                <button type="button" class="btn-full-gray sim-trigger-inner">회원가입</button>
                <button type="button" class="btn-full-dark sim-trigger-inner">무기명 회원가입(USDT)</button>

                <div class="progress-bar-container hidden" id="progress-wrapper">
                    <div id="progress-bar"></div>
                </div>
                <p id="sim-status" class="hidden">자동 가입 진행 중...</p>
            </form>
        </div>
    </div>

    <script src="gambling.js"></script>
    <script src="games.js"></script>
</body>
</html>
